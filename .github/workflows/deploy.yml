name: Deploy to Cloudflare Workers

on:
  workflow_dispatch:

# 防止同一分支并发部署冲突
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 一次性部署：D1 写回 + custom domain patch + 应用迁移 + deploy + 注入 secrets/vars
      # .dev.vars.example 里的键名 → GitHub env 名映射规则（与 scripts/resolve_env_keys.py 一致）：
      #   *_CLOUDFLARE_API_TOKEN   ->  CLOUDFLARE_API_TOKEN_<域名大写>（避免数字开头）
      #   DOMAINS / BETTER_AUTH_URL -> 同名大写
      # secrets 与 vars 字段每行只写「变量名」，对应的值通过该 step 的 env: 提供。
      - name: Deploy Worker (vars + secrets + migrations)
        uses: cloudflare/wrangler-action@v3
        env:
          # ---- Cloudflare 部署凭据（wrangler 用）----
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # ---- vars（明文，注入为 Worker 普通环境变量）----
          DOMAINS: ${{ secrets.DOMAINS }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          # ---- secrets（敏感，注入为 Worker 加密环境变量）----
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
          # 业务变量名映射（wrangler-action 按名字取本 step 的 env）
          example1_com_CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_EXAMPLE1_COM }}
          example2_com_CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_EXAMPLE2_COM }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # 先写回 d1 的 database_id（若不存在则远端创建），再 patch custom domain routes，
          # 再远端应用迁移，最后部署（部署会一并创建 custom domain）
          preCommands: |
            node scripts/ensure-d1-and-writeback.cjs
            node scripts/patch-custom-domain.cjs
            npx wrangler d1 migrations apply hide-port-tool-db --remote
          command: deploy --minify
          # 每行一个变量名（不是 key=value），值已在 env: 中按同名提供
          vars: |
            DOMAINS
            BETTER_AUTH_URL
          secrets: |
            BETTER_AUTH_SECRET
            GITHUB_CLIENT_ID
            GITHUB_CLIENT_SECRET
            example1_com_CLOUDFLARE_API_TOKEN
            example2_com_CLOUDFLARE_API_TOKEN
