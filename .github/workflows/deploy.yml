name: Deploy to Cloudflare Workers

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5c # v4

      - name: Install pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Validate deployment inputs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_DOMAINS_API_TOKEN: ${{ secrets.CLOUDFLARE_DOMAINS_API_TOKEN }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          DATA_ENCRYPTION_KEY: ${{ secrets.DATA_ENCRYPTION_KEY }}
          DATA_ENCRYPTION_KEY_PREVIOUS: ${{ secrets.DATA_ENCRYPTION_KEY_PREVIOUS }}
          OAUTH_ALLOWED_HOSTS: ${{ vars.OAUTH_ALLOWED_HOSTS }}
        run: |
          set -euo pipefail
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_DOMAINS_API_TOKEN BETTER_AUTH_URL BETTER_AUTH_SECRET DATA_ENCRYPTION_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required GitHub Actions secret: $name" >&2
              exit 1
            fi
          done
          if [ "${#BETTER_AUTH_SECRET}" -lt 32 ] || [ "$BETTER_AUTH_SECRET" = "better-auth-secret-12345678901234567890" ]; then
            echo "BETTER_AUTH_SECRET must be a private random value of at least 32 characters" >&2
            exit 1
          fi
          if [ "${#DATA_ENCRYPTION_KEY}" -lt 32 ] || [ "$DATA_ENCRYPTION_KEY" = "replace_with_an_independent_long_random_string" ]; then
            echo "DATA_ENCRYPTION_KEY must be a private random value of at least 32 characters" >&2
            exit 1
          fi
          if [ "$DATA_ENCRYPTION_KEY" = "$BETTER_AUTH_SECRET" ]; then
            echo "DATA_ENCRYPTION_KEY must be independent from BETTER_AUTH_SECRET" >&2
            exit 1
          fi
          if [ -n "${DATA_ENCRYPTION_KEY_PREVIOUS:-}" ] && [ "${#DATA_ENCRYPTION_KEY_PREVIOUS}" -lt 32 ]; then
            echo "DATA_ENCRYPTION_KEY_PREVIOUS must contain at least 32 characters when set" >&2
            exit 1
          fi
          if [ -n "${DATA_ENCRYPTION_KEY_PREVIOUS:-}" ] && [ "$DATA_ENCRYPTION_KEY_PREVIOUS" = "$DATA_ENCRYPTION_KEY" ]; then
            echo "DATA_ENCRYPTION_KEY_PREVIOUS must differ from DATA_ENCRYPTION_KEY" >&2
            exit 1
          fi
          node <<'NODE'
          const raw = process.env.BETTER_AUTH_URL.trim()
          const url = new URL(raw)
          if (url.protocol !== 'https:' || raw !== url.origin) {
            throw new Error('BETTER_AUTH_URL must be an HTTPS origin without a path, query, or fragment')
          }
          const allowlist = (process.env.OAUTH_ALLOWED_HOSTS || '').trim()
          if (allowlist) {
            for (const pattern of allowlist.split(',').map((value) => value.trim()).filter(Boolean)) {
              if (!/^(?:\*\.)?(?:[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?\.)+[a-z]{2,63}$/i.test(pattern)) {
                throw new Error(`Invalid OAUTH_ALLOWED_HOSTS pattern: ${pattern}`)
              }
            }
          }
          NODE
          parsed="$(python scripts/parse_domain_tokens.py "$CLOUDFLARE_DOMAINS_API_TOKEN")"
          if [ -z "$(printf '%s' "$parsed" | sed -n '1p')" ]; then
            echo "CLOUDFLARE_DOMAINS_API_TOKEN contains no valid domain/token pairs" >&2
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static assets
        run: pnpm build

      - name: Validate migration compatibility
        run: pnpm run validate:migrations

      - name: Run tests
        run: pnpm test

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Validate Worker bundle
        run: pnpm exec wrangler deploy --dry-run

      - name: Build deployment var and secret lists
        id: lists
        env:
          CLOUDFLARE_DOMAINS_API_TOKEN: ${{ secrets.CLOUDFLARE_DOMAINS_API_TOKEN }}
          DATA_ENCRYPTION_KEY_PREVIOUS: ${{ secrets.DATA_ENCRYPTION_KEY_PREVIOUS }}
        run: |
          set -euo pipefail
          out="$(python scripts/parse_domain_tokens.py "$CLOUDFLARE_DOMAINS_API_TOKEN")"
          domains_json="$(printf '%s' "$out" | sed -n '3p')"
          echo "domains=$domains_json" >> "$GITHUB_OUTPUT"
          {
            echo "vars<<LIST_EOF"
            echo "DOMAINS"
            echo "BETTER_AUTH_URL"
            echo "OAUTH_ALLOWED_HOSTS"
            echo "LIST_EOF"
          } >> "$GITHUB_OUTPUT"
          {
            echo "secrets<<LIST_EOF"
            echo "BETTER_AUTH_SECRET"
            echo "DATA_ENCRYPTION_KEY"
            if [ -n "${DATA_ENCRYPTION_KEY_PREVIOUS:-}" ]; then
              echo "DATA_ENCRYPTION_KEY_PREVIOUS"
            fi
            echo "CLOUDFLARE_DOMAINS_API_TOKEN"
            echo "LIST_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy Worker (vars, secrets, and migrations)
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DOMAINS: ${{ steps.lists.outputs.domains }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          DATA_ENCRYPTION_KEY: ${{ secrets.DATA_ENCRYPTION_KEY }}
          DATA_ENCRYPTION_KEY_PREVIOUS: ${{ secrets.DATA_ENCRYPTION_KEY_PREVIOUS }}
          CLOUDFLARE_DOMAINS_API_TOKEN: ${{ secrets.CLOUDFLARE_DOMAINS_API_TOKEN }}
          OAUTH_ALLOWED_HOSTS: ${{ vars.OAUTH_ALLOWED_HOSTS }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          preCommands: |
            node scripts/ensure-d1-and-writeback.cjs
            node scripts/patch-custom-domain.cjs
            npx wrangler d1 migrations apply mc-server-hide-port-tool-db --remote
          command: deploy --minify
          vars: ${{ steps.lists.outputs.vars }}
          secrets: ${{ steps.lists.outputs.secrets }}
